<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Institute FAQ Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="chatbot-container">
        
        <div class="chat-header">
            <div class="header-content">
                <svg class="bot-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 8V4H8"/>
                    <rect width="16" height="12" x="4" y="8" rx="2"/>
                    <path d="M2 14h2"/>
                    <path d="M20 14h2"/>
                    <path d="M15 13v2"/>
                    <path d="M9 13v2"/>
                </svg>
                <div>
                    <h1>Tech Institute FAQ Bot</h1>
                    <p>Ask me anything about our institute!</p>
                </div>
            </div>
        </div>

        
        <div id="chat-messages" class="chat-messages"></div>

        
        <div class="chat-input-container">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Type your question here..."
                    autocomplete="off"
                />
                <button id="send-btn" class="send-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m22 2-7 20-4-9-9-4Z"/>
                        <path d="M22 2 11 13"/>
                    </svg>
                    Send
                </button>
            </div>
        </div>
    </div>

    <script src="synonyms.js"></script>
    <script src="chatbot.js"></script>
    
</body>
</html>
